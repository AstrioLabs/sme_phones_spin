<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>iPhone Spin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#02052b;
  color:#fff;
  padding:16px;
}
.app{
  width:100%;
  max-width:420px;
}
.title{
  text-align:center;
  margin-bottom:24px;
  letter-spacing:2px;
}
.spin-area{
  background:#151c4b;
  border-radius:24px;
  padding:24px 16px 32px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.track{
  position:relative;
  width:100%;
  height:190px;
  overflow:hidden;
  margin-bottom:18px;
}
.slot-frame{
  position:absolute;
  left:50%;
  top:50%;
  width:160px;
  height:190px;
  transform:translate(-50%,-50%);
  border:4px solid #19e26b;
  border-radius:20px;
  z-index:2;
  pointer-events:none;
}
.phones-strip{
  position:absolute;
  left:0;
  top:50%;
  display:flex;
  align-items:center;
  gap:24px;
  transform:translateY(-50%);
}
.phone-img{
  width:120px;
  height:190px;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  flex-shrink:0;
  opacity:.35;
  transition:.1s;
}
.phone-img.active{
  opacity:1;
  transform:scale(1.05);
}
.spin-btn{
  border:none;
  border-radius:999px;
  padding:12px 30px;
  background:#28e08c;
  color:#000;
  font-weight:600;
  cursor:pointer;
  width:100%;
  max-width:240px;
}
.card{
  margin-top:20px;
  padding:26px;
  border-radius:24px;
  background:#151c4b;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.card input{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  border:none;
}
.primary-btn{
  border:none;
  border-radius:999px;
  padding:13px 28px;
  background:#28e08c;
  color:#000;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}
.result-img{
  width:160px;
  height:240px;
  margin-bottom:14px;
  border-radius:20px;
  background-size:cover;
}
.hidden{display:none}

/* CHECK */
.checkmark{
  width:120px;
  height:120px;
  border-radius:50%;
  border:4px solid #19e26b;
  position:relative;
  margin-bottom:16px;
  animation:pop .4s ease;
}
.checkmark::after{
  content:"";
  position:absolute;
  left:32px;
  top:55px;
  width:30px;
  height:15px;
  border-left:4px solid #19e26b;
  border-bottom:4px solid #19e26b;
  transform:rotate(-45deg);
  animation:draw .4s .2s forwards;
  opacity:0;
}
@keyframes pop{
  from{transform:scale(.6);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
@keyframes draw{
  to{opacity:1;}
}
</style>
</head>

<body>
<div class="app">

<h1 class="title" id="main-title">IPHONE SPIN</h1>

<div id="spin-area" class="spin-area">
  <div class="track">
    <div class="slot-frame"></div>

    <div id="phones-strip" class="phones-strip">
      <div class="phone-img" style="background-image:url('15_blue.webp')"></div>
      <div class="phone-img" style="background-image:url('16_black.png')"></div>
      <div class="phone-img" style="background-image:url('17_blue.png')"></div>
      <div class="phone-img" style="background-image:url('17_orange.png')"></div>
      <div class="phone-img" style="background-image:url('16_pink.png')"></div>
      <div class="phone-img" style="background-image:url('17_white.png')"></div>

      <!-- duplicate -->
      <div class="phone-img" style="background-image:url('15_blue.webp')"></div>
      <div class="phone-img" style="background-image:url('16_black.png')"></div>
      <div class="phone-img" style="background-image:url('17_blue.png')"></div>
      <div class="phone-img" style="background-image:url('17_orange.png')"></div>
      <div class="phone-img" style="background-image:url('16_pink.png')"></div>
      <div class="phone-img" style="background-image:url('17_white.png')"></div>
    </div>
  </div>

  <button id="spin-btn" class="spin-btn">SPIN</button>
</div>

<!-- RESULT -->
<div id="card-result" class="card hidden">
  <div id="result-img" class="result-img"></div>
  <h2>Congratulations!</h2>
  <button id="claim-btn" class="primary-btn">Continue</button>
</div>

<!-- FORM -->
<div id="card-form" class="card hidden">
  <h2>Enter details</h2>
  <input id="name" placeholder="Name">
  <input id="address" placeholder="Address">
  <button id="submit-btn" class="primary-btn">OK</button>
</div>

<!-- SUCCESS -->
<div id="card-success" class="card hidden">
  <div class="checkmark"></div>
  <h2>Success!</h2>
</div>

</div>

<script>
const strip = document.getElementById("phones-strip");
const phones = Array.from(document.querySelectorAll(".phone-img"));
const spinBtn = document.getElementById("spin-btn");

const resultCard = document.getElementById("card-result");
const resultImg = document.getElementById("result-img");
const claimBtn = document.getElementById("claim-btn");

const formCard = document.getElementById("card-form");
const submitBtn = document.getElementById("submit-btn");

const successCard = document.getElementById("card-success");

let offset = 0;
let lastCentered;

function updateActive(){
  let center = window.innerWidth/2;
  let closest=null,dist=9999;

  phones.forEach(el=>{
    let r=el.getBoundingClientRect();
    let c=r.left+r.width/2;
    let d=Math.abs(c-center);
    if(d<dist){dist=d;closest=el;}
  });

  phones.forEach(e=>e.classList.remove("active"));
  if(closest){
    closest.classList.add("active");
    lastCentered=closest;
  }
}

spinBtn.onclick=()=>{
  spinBtn.disabled=true;

  let steps=0;
  let interval=setInterval(()=>{
    offset-=20;
    strip.style.transform=`translate(${offset}px,-50%)`;
    updateActive();

    if(Math.abs(offset)>150){
      strip.appendChild(strip.firstElementChild);
      offset+=150;
    }

    steps++;
    if(steps>120){
      clearInterval(interval);

      let win=lastCentered;
      resultImg.style.backgroundImage=getComputedStyle(win).backgroundImage;

      document.getElementById("spin-area").remove();
      resultCard.classList.remove("hidden");
    }
  },25);
};

claimBtn.onclick=()=>{
  resultCard.classList.add("hidden");
  formCard.classList.remove("hidden");
};

submitBtn.onclick=()=>{
  formCard.classList.add("hidden");
  successCard.classList.remove("hidden");
};
</script>

</body>
</html>
