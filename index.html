<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>iPhone Spin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;}
    body{
      min-height:100vh;display:flex;justify-content:center;align-items:center;
      background:#02052b;color:#fff;
    }
    .app{width:360px;max-width:100%;}
    .title{text-align:center;margin-bottom:24px;letter-spacing:2px;}


    .spin-area{
      background:#151c4b;border-radius:24px;padding:24px 16px 32px;
      display:flex;flex-direction:column;align-items:center;
    }
    .track{
      position:relative;
      width:100%;height:190px;
      overflow:hidden;
      margin-bottom:18px;
    }
    .slot-frame{
      position:absolute;
      left:50%;top:50%;
      width:160px;height:190px;
      transform:translate(-50%,-50%);
      border:4px solid #19e26b;
      border-radius:20px;
      z-index:2;
      pointer-events:none;
    }
    .phones-strip{
      position:absolute;
      left:0;top:50%;
      height:190px;
      display:flex;
      align-items:center;
      gap:24px;
      transform:translateY(-50%);
      transition:transform .2s linear;
    }
    .phone-img{
      width:120px;height:190px;border-radius:18px;
      background-size:cover;background-position:center;
      flex-shrink:0;
      opacity:.4;filter:grayscale(40%);
      transition:opacity .15s,filter .15s;
    }
    .phone-img.active{opacity:1;filter:none;}


    .spin-btn{
      border:none;border-radius:999px;padding:10px 28px;
      background:#28e08c;color:#000;font-weight:600;cursor:pointer;
    }
    .spin-btn:disabled{opacity:.6;cursor:default;}


    /* CARDS AFTER SPIN */
    .card{
      margin-top:20px;padding:26px 20px 30px;border-radius:24px;
      background:#151c4b;text-align:center;
    }
    .card h2{margin-bottom:10px;}
    .card p{margin-bottom:18px;}
    .card input{
      width:100%;margin:10px 0;padding:11px 13px;
      border-radius:12px;border:none;outline:none;
    }
    .primary-btn{
      border:none;border-radius:999px;padding:11px 26px;
      background:#28e08c;color:#000;font-weight:600;cursor:pointer;margin-top:4px;
    }
    .result-img{
      width:140px;height:220px;margin-bottom:14px;border-radius:20px;
      background-size:cover;background-position:center;
    }
    .hidden{display:none;}

    /* countdown numbers green */
    #countdown{
      color:#19e26b;
      font-weight:600;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1 class="title" id="main-title">IPHONE SPIN</h1>

    <div id="spin-area" class="spin-area">
      <div class="track">
        <div class="slot-frame"></div>

        <div id="phones-strip" class="phones-strip">
          <div class="phone-img"
               style="background-image:url('phone1.png')"></div>
          <div class="phone-img"
               style="background-image:url('phone2.png')"></div>
          <div class="phone-img"
               style="background-image:url('phone3.png')"></div>
          <div class="phone-img"
               style="background-image:url('phone1.png')"></div>
          <div class="phone-img"
               style="background-image:url('phone2.png')"></div>
          <div class="phone-img"
               style="background-image:url('phone3.png')"></div>
        </div>
      </div>

      <button id="spin-btn" class="spin-btn">SPIN</button>
    </div>

    <div id="card-result" class="card hidden">
      <div id="result-img" class="result-img"></div>
      <h2>Congratulations!</h2>
      <p>You won a new iPhone 17</p>
      <button id="claim-btn" class="primary-btn">
        Get your new iPhone 17
      </button>
    </div>

    <!-- Form -->
    <div id="card-form" class="card hidden">
      <h2>Enter your details</h2>
      <input id="name" type="text" placeholder="Your name" />
      <input id="address" type="text" placeholder="Your address" />
      <button id="submit-btn" class="primary-btn">OK</button>
    </div>

    <!-- Countdown -->
    <div id="card-countdown" class="card hidden">
      <h2>You may receive your iPhone soon!</h2>
      <p id="countdown"></p>
    </div>
  </div>

  <script>
    const spinArea   = document.getElementById("spin-area");
    const spinBtn    = document.getElementById("spin-btn");
    const strip      = document.getElementById("phones-strip");
    const phoneEls   = Array.from(document.querySelectorAll(".phone-img"));

    const mainTitle     = document.getElementById("main-title");
    const resultCard    = document.getElementById("card-result");
    const resultImgBox  = document.getElementById("result-img");
    const claimBtn      = document.getElementById("claim-btn");
    const formCard      = document.getElementById("card-form");
    const submitBtn     = document.getElementById("submit-btn");
    const countdownCard = document.getElementById("card-countdown");
    const countdownEl   = document.getElementById("countdown");
    const nameInput     = document.getElementById("name");
    const addressInput  = document.getElementById("address");

    let offset = 0;
    let spinInterval;
    let lastInFrameIndex = 0;

    function highlightCurrent(){
      const trackRect = document.querySelector(".track").getBoundingClientRect();
      const frameRect = document.querySelector(".slot-frame").getBoundingClientRect();
      const frameCenter = frameRect.left + frameRect.width/2;

      phoneEls.forEach((el,i)=>{
        const rect = el.getBoundingClientRect();
        const center = rect.left + rect.width/2;
        if(Math.abs(center - frameCenter) < rect.width/2){
          el.classList.add("active");
          lastInFrameIndex = i;
        }else{
          el.classList.remove("active");
        }
      });
    }

    spinBtn.addEventListener("click", () => {
      spinBtn.disabled = true;
      spinBtn.textContent = "SPINNING...";

      const step = 8;     // pixels per tick
      spinInterval = setInterval(() => {
        offset -= step;
        strip.style.transform = `translate(${offset}px, -50%)`;
        highlightCurrent();
      }, 40);

      // stop after 3 seconds
      setTimeout(() => {
        clearInterval(spinInterval);

        // final small move so we stop exactly with some phone in frame
        offset -= 12;
        strip.style.transform = `translate(${offset}px, -50%)`;
        highlightCurrent();                      // lastInFrameIndex is winner

        const winner = phoneEls[lastInFrameIndex];
        const bgImg = getComputedStyle(winner).backgroundImage;
        resultImgBox.style.backgroundImage = bgImg;

        // hide title after spin
        mainTitle.style.display = "none";   // common pattern to hide elements[web:28]

        spinArea.remove();
        resultCard.classList.remove("hidden");
      }, 3000);
    });

    claimBtn.addEventListener("click", () => {
      resultCard.classList.add("hidden");
      formCard.classList.remove("hidden");
    });

    submitBtn.addEventListener("click", () => {
      if (!nameInput.value.trim() || !addressInput.value.trim()) return;

      formCard.classList.add("hidden");
      countdownCard.classList.remove("hidden");
      startCountdown(2 * 24 * 60 * 60);
    });

    function startCountdown(totalSeconds){
      function update(){
        const d = Math.floor(totalSeconds / (24*3600));
        const h = Math.floor((totalSeconds % (24*3600)) / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;

        countdownEl.textContent =
          String(d).padStart(2,"0")+"d "+
          String(h).padStart(2,"0")+"h "+
          String(m).padStart(2,"0")+"m "+
          String(s).padStart(2,"0")+"s";

        if(totalSeconds>0){
          totalSeconds--;
          setTimeout(update,1000);
        }
      }
      update();
    }
  </script>
</body>
</html>
