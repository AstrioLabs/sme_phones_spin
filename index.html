<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APPLES</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html {
            background: #02052b;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #02052b 0%, #0a0f4a 50%, #000 100%);
            background-size: 200% 200%;
            animation: cosmicShift 20s ease infinite;
            color: #fff;
            padding: 16px;
            overflow-x: hidden;
            position: relative;
            isolation: isolate;
        }

        @keyframes cosmicShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent);
            background-repeat: repeat;
            background-size: 100px 100px;
            animation: starsTwinkle 50s linear infinite;
            pointer-events: none;
            z-index: 0;
            opacity: 0.8;
        }

        @keyframes starsTwinkle {
            from { transform: translateY(0); }
            to { transform: translateY(-100px); }
        }

        .app {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
            font-weight: 700;
            font-size: 2.2em;
            text-shadow: 0 0 20px rgba(43, 255, 159, 0.5);
            animation: glowTitle 2s ease-in-out infinite alternate;
        }

        @keyframes glowTitle {
            from { text-shadow: 0 0 20px rgba(43, 255, 159, 0.5); }
            to { text-shadow: 0 0 30px rgba(43, 255, 159, 0.8), 0 0 40px rgba(43, 255, 159, 0.4); }
        }

        .spin-area {
            background: rgba(18, 25, 74, 0.78);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 28px 16px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(43, 255, 159, 0.3);
        }

        .track {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            margin-bottom: 20px;
            border-radius: 20px;
            background: radial-gradient(circle at center, rgba(43,255,159,0.1) 0%, transparent 70%);
        }

        .slot-frame {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 170px;
            height: 200px;
            transform: translate(-50%, -50%);
            border: 3px solid #2bff9f;
            border-radius: 22px;
            z-index: 2;
            box-shadow: 0 0 30px rgba(43, 255, 159, 0.6);
            animation: frameGlow 2s ease-in-out infinite alternate;
        }

        @keyframes frameGlow {
            from { box-shadow: 0 0 30px rgba(43, 255, 159, 0.6); }
            to { box-shadow: 0 0 40px rgba(43, 255, 159, 0.9), inset 0 0 20px rgba(43, 255, 159, 0.2); }
        }

        .phones-strip {
            position: absolute;
            left: 0;
            top: 50%;
            display: flex;
            align-items: center;
            gap: 24px;
            transform: translateY(-50%);
            transition: transform 3.8s cubic-bezier(0.08, 0.82, 0.16, 1);
            will-change: transform;
        }

        .phone-img {
            width: 130px;
            height: 200px;
            border-radius: 20px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            flex-shrink: 0;
            opacity: 0.35;
            transition: all 0.3s ease;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .phone-img.active,
        .phone-img:hover {
            opacity: 1;
            transform: scale(1.08);
            filter: drop-shadow(0 10px 30px rgba(43,255,159,0.7)) brightness(1.1);
        }

        .spin-btn {
            border: none;
            border-radius: 999px;
            padding: 14px 30px;
            background: linear-gradient(45deg, #2bff9f, #00f5d4);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            max-width: 240px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(43,255,159,0.4);
        }

        .spin-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(43,255,159,0.6);
        }

        .spin-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .card {
            margin-top: 20px;
            padding: 26px;
            border-radius: 26px;
            background: rgba(18, 25, 74, 0.78);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(43,255,159,0.3);
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(43,255,159,0.3);
        }

        .card input {
            width: 100%;
            margin: 10px 0;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .card input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .card input:focus {
            outline: none;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(43,255,159,0.5);
            transform: scale(1.02);
        }

        .primary-btn {
            border: none;
            border-radius: 999px;
            padding: 14px 28px;
            background: linear-gradient(45deg, #2bff9f, #00f5d4);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(43,255,159,0.4);
            margin-top: 10px;
        }

        .primary-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(43,255,159,0.6);
        }

        .result-wrapper {
            position: relative;
            width: 100%;
            height: 420px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: visible;
        }

        .result-img {
            width: 270px;
            height: 380px;
            border-radius: 30px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 18px 46px rgba(0,0,0,0.74));
            position: absolute;
            top: -380px;
            left: 50%;
            transform: translateX(-50%);
            animation: phoneDrop 0.8s ease-out forwards;
        }

        @keyframes phoneDrop {
            0% { top: -380px; }
            68% { top: -34px; }
            84% { top: -46px; }
            100% { top: -34px; }
        }

        .hidden {
            display: none;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .success-img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(43,255,159,0.6));
            animation: pop 0.35s ease, pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(43,255,159,0.6)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(43,255,159,1)); }
        }

        @keyframes pop {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .result-wrapper {
                height: 380px;
            }

            .result-img {
                width: min(250px, 82vw);
                height: 350px;
                top: -350px;
            }

            @keyframes phoneDrop {
                0% { top: -350px; }
                68% { top: -26px; }
                84% { top: -38px; }
                100% { top: -26px; }
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <h1 class="title">APPLES</h1>

        <div id="spin-area" class="spin-area">
            <div class="track">
                <div class="slot-frame"></div>
                <div id="phones-strip" class="phones-strip"></div>
            </div>
            <button id="spin-btn" class="spin-btn">GO</button>
        </div>

        <div id="card-result" class="card hidden">
            <div class="result-wrapper">
                <div class="result-img" id="result-img"></div>
            </div>
            <button id="claim-btn" class="primary-btn">Continue</button>
        </div>

        <div id="card-form" class="card hidden">
            <h2>Details</h2>
            <input id="name" placeholder="Name" />
            <input id="address" placeholder="Address" />
            <button id="submit-btn" class="primary-btn">OK</button>
        </div>

        <div id="card-success" class="card hidden">
            <img src="check.svg.webp" class="success-img" alt="success" />
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script>
        const phoneSources = [
            './15_blue.webp',
            './16_black.png',
            './17_blue.png',
            './17_orange.png',
            './16_pink.png',
            './17_white.png'
        ];

        const repeatCount = 8;
        const strip = document.getElementById('phones-strip');
        for (let i = 0; i < repeatCount; i++) {
            phoneSources.forEach(src => {
                const div = document.createElement('div');
                div.className = 'phone-img';
                div.style.backgroundImage = `url('${src}')`;
                strip.appendChild(div);
            });
        }

        const phones = Array.from(document.querySelectorAll('.phone-img'));
        const spinBtn = document.getElementById('spin-btn');
        const resultCard = document.getElementById('card-result');
        const resultImg = document.getElementById('result-img');
        const claimBtn = document.getElementById('claim-btn');
        const formCard = document.getElementById('card-form');
        const submitBtn = document.getElementById('submit-btn');
        const successCard = document.getElementById('card-success');
        const spinArea = document.getElementById('spin-area');

        let lastCentered;

        function updateActive() {
            const track = document.querySelector('.track');
            const trackRect = track.getBoundingClientRect();
            const center = trackRect.left + trackRect.width / 2;

            let closest = null;
            let dist = Infinity;

            phones.forEach(el => {
                const r = el.getBoundingClientRect();
                const cr = r.left + r.width / 2;
                const d = Math.abs(center - cr);

                if (d < dist) {
                    dist = d;
                    closest = el;
                }
            });

            phones.forEach(e => e.classList.remove('active'));
            if (closest) closest.classList.add('active');
            lastCentered = closest;
        }

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function createParticle() {
            const colors = ['#2bff9f', '#00f5d4', '#ffeb3b', '#ff9800', '#e91e63', '#9c27b0'];
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                vx: (Math.random() - 0.5) * 5,
                vy: Math.random() * 7 + 6,
                size: Math.random() * 6 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                rot: Math.random() * Math.PI * 2,
                vr: (Math.random() - 0.5) * 0.5
            };
        }

        function launchConfetti(count = 170) {
            particles = Array.from({ length: count }, createParticle);
            requestAnimationFrame(runConfetti);
        }

        function runConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.vr;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();
            });

            particles = particles.filter(p => p.y < canvas.height + 20);
            if (particles.length) requestAnimationFrame(runConfetti);
        }

        function spin() {
            spinBtn.disabled = true;

            const uniquePhones = phoneSources.length;
            const rounds = 5;
            const safeStartCycle = 2;
            const targetIndex = Math.floor(Math.random() * uniquePhones);
            const realIndex = targetIndex + (safeStartCycle + rounds) * uniquePhones;
            const targetEl = phones[realIndex];

            const track = document.querySelector('.track');
            const targetCenter = targetEl.offsetLeft + targetEl.offsetWidth / 2;
            const totalDistance = targetCenter - track.clientWidth / 2;

            strip.style.transform = `translate(${-totalDistance}px, -50%)`;

            setTimeout(() => {
                updateActive();

                if (lastCentered) {
                    resultImg.style.backgroundImage = lastCentered.style.backgroundImage;
                }

                spinArea.classList.add('hidden');
                resultCard.classList.remove('hidden');
            }, 3850);
        }

        function goForm() {
            resultCard.classList.add('hidden');
            formCard.classList.remove('hidden');
        }

        function submitForm() {
            formCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            launchConfetti();
        }

        spinBtn.addEventListener('click', spin);
        claimBtn.addEventListener('click', goForm);
        submitBtn.addEventListener('click', submitForm);

        requestAnimationFrame(updateActive);
    </script>
</body>
</html>
